<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#0f172a"/>
  
  <!-- Calendar main -->
  <rect x="50" y="65" width="156" height="150" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
  
  <!-- Calendar header with days -->
  <rect x="50" y="65" width="156" height="32" rx="12" fill="#3b82f6"/>
  
  <!-- Day labels -->
  <text x="67" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">M</text>
  <text x="97" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">T</text>
  <text x="127" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">W</text>
  <text x="157" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">T</text>
  <text x="187" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">F</text>
  
  <!-- Calendar grid lines -->
  <line x1="50" y1="97" x2="206" y2="97" stroke="#475569" stroke-width="1"/>
  <line x1="50" y1="125" x2="206" y2="125" stroke="#475569" stroke-width="1"/>
  <line x1="50" y1="153" x2="206" y2="153" stroke="#475569" stroke-width="1"/>
  <line x1="50" y1="181" x2="206" y2="181" stroke="#475569" stroke-width="1"/>
  
  <line x1="82" y1="65" x2="82" y2="215" stroke="#475569" stroke-width="1"/>
  <line x1="112" y1="65" x2="112" y2="215" stroke="#475569" stroke-width="1"/>
  <line x1="142" y1="65" x2="142" y2="215" stroke="#475569" stroke-width="1"/>
  <line x1="172" y1="65" x2="172" y2="215" stroke="#475569" stroke-width="1"/>
  
  <!-- Date numbers in calendar -->
  <text x="67" y="115" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">1</text>
  <text x="97" y="115" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">2</text>
  <text x="127" y="115" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">3</text>
  <text x="157" y="115" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">4</text>
  <text x="187" y="115" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">5</text>
  
  <text x="67" y="143" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">8</text>
  <text x="97" y="143" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">9</text>
  <text x="127" y="143" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">10</text>
  <text x="157" y="143" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">11</text>
  <text x="187" y="143" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">12</text>
  
  <text x="67" y="171" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">15</text>
  <text x="97" y="171" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">16</text>
  <text x="127" y="171" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">17</text>
  <text x="157" y="171" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">18</text>
  <text x="187" y="171" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">19</text>
  
  <!-- Highlighted date cell (marked) -->
  <rect x="113" y="130" width="28" height="28" rx="4" fill="#10b981" opacity="0.3"/>
  
  <!-- Book/Pen marking the calendar -->
  <!-- Pen body (angled) -->
  <rect x="145" y="95" width="8" height="55" rx="4" fill="#ef4444" transform="rotate(-25 149 122)"/>
  
  <!-- Pen tip -->
  <polygon points="149,145 145,155 153,155" fill="#333333" transform="rotate(-25 149 122)"/>
  
  <!-- Pen cap/top -->
  <circle cx="159" cy="92" r="6" fill="#333333" transform="rotate(-25 149 122)"/>
  
  <!-- Checkmark on marked date -->
  <path d="M 120 140 L 123 143 L 128 135" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>